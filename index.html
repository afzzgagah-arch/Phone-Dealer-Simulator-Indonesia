<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Dealer Simulator Indonesia</title>
    <style>
        body{
            margin:0;
            background:#121212;
            color:white;
            font-family:Arial,sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }
        h1{
            color:#4CAF50;
        }
        .card{
            background:#1e1e1e;
            padding:30px;
            border-radius:15px;
            width:90%;
            max-width:500px;
            box-shadow:0 0 15px rgba(0,0,0,.4);
        }
        .btn{
            margin-top:20px;
            padding:12px 20px;
            border:none;
            border-radius:10px;
            background:#4CAF50;
            color:white;
            font-size:16px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>📱 Phone Dealer Simulator Indonesia 🇮🇩</h1>
    <p>Alpha v0.2</p>
    <p>Game sedang dalam pengembangan...</p>

    <button class="btn">Mulai Game (Segera Hadir)</button>
</div>

</body>
</html>
